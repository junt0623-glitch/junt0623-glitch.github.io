<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ベクターデザイン工房</title>
<style>
:root{
  --ink:#17181c; --panel:#1f2127; --panel2:#25272e; --line:#2e313a;
  --text:#dcdee3; --muted:#8b909b; --accent:#d24a35; --accent-h:#e05a44;
  --canvas-bg:#2a2c33;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%; overflow:hidden;}
body{
  font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Segoe UI",Meiryo,sans-serif;
  background:var(--ink); color:var(--text); font-size:13px;
  display:flex; flex-direction:column;
}
button{font-family:inherit; font-size:12px; color:var(--text); background:var(--panel2);
  border:1px solid var(--line); border-radius:4px; padding:4px 9px; cursor:pointer;}
button:hover{background:#2d3039; border-color:#3a3e49;}
button:focus-visible{outline:2px solid var(--accent); outline-offset:1px;}
button.primary{background:var(--accent); border-color:var(--accent);}
button.primary:hover{background:var(--accent-h);}
input,select,textarea{font-family:inherit; font-size:12px; color:var(--text);
  background:#191b20; border:1px solid var(--line); border-radius:4px; padding:3px 6px;}
input:focus,select:focus,textarea:focus{outline:1px solid var(--accent);}
input[type=color]{padding:1px; width:34px; height:24px; cursor:pointer;}
input[type=number]{width:58px;}
input[type=checkbox]{accent-color:var(--accent);}
input[type=range]{accent-color:var(--accent);}

/* ===== 上部バー ===== */
#topbar{
  display:flex; align-items:center; gap:8px; padding:6px 10px;
  background:var(--panel); border-bottom:1px solid var(--line); flex:0 0 auto; flex-wrap:wrap;
}
#logo{display:flex; align-items:center; gap:8px; margin-right:6px;}
#seal{width:26px; height:26px; background:var(--accent); color:#fff; border-radius:3px;
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25);}
#appname{font-weight:700; letter-spacing:.05em; font-size:13px;}
#fname{width:150px;}
.sep{width:1px; height:20px; background:var(--line); margin:0 2px;}
#zoomLabel{min-width:48px; text-align:center; color:var(--muted);}
.toggle{display:flex; align-items:center; gap:4px; color:var(--muted); cursor:pointer; user-select:none;}

/* ===== 中央レイアウト ===== */
#main{flex:1 1 auto; display:flex; min-height:0;}
#toolbar{
  flex:0 0 46px; background:var(--panel); border-right:1px solid var(--line);
  display:flex; flex-direction:column; align-items:center; padding:8px 0; gap:4px; overflow-y:auto;
}
.tbtn{width:34px; height:34px; padding:0; display:flex; align-items:center; justify-content:center;
  background:transparent; border:1px solid transparent; border-radius:6px; position:relative;}
.tbtn svg{width:18px; height:18px; stroke:var(--text); fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round;}
.tbtn:hover{background:var(--panel2);}
.tbtn.active{background:#3a2320; border-color:var(--accent);}
.tbtn.active svg{stroke:var(--accent-h);}

#canvasWrap{flex:1 1 auto; position:relative; background:var(--canvas-bg); overflow:hidden;}
#stage{width:100%; height:100%; display:block; touch-action:none;}
#stage.tool-select{cursor:default;}
#stage.tool-hand{cursor:grab;}
#stage.panning{cursor:grabbing !important;}
#stage.tool-rect,#stage.tool-ellipse,#stage.tool-line,#stage.tool-poly,#stage.tool-star,#stage.tool-pen,#stage.tool-pencil,#stage.tool-node,#stage.tool-picker{cursor:crosshair;}
#stage.tool-text{cursor:text;}

#textEditor{position:absolute; display:none; z-index:20;}
#textEditor textarea{background:#fff; color:#111; border:1px solid var(--accent);
  min-width:120px; min-height:30px; resize:both; line-height:1.3;}

/* ===== 右パネル ===== */
#side{flex:0 0 248px; background:var(--panel); border-left:1px solid var(--line);
  display:flex; flex-direction:column; min-height:0;}
.paneltitle{padding:7px 10px; font-weight:700; font-size:12px; letter-spacing:.06em;
  color:var(--muted); border-bottom:1px solid var(--line); background:var(--panel2);}
#props{flex:0 0 auto; max-height:55%; overflow-y:auto; padding:10px; border-bottom:1px solid var(--line);}
.prow{display:flex; align-items:center; gap:6px; margin-bottom:7px; flex-wrap:wrap;}
.prow label{color:var(--muted); min-width:34px; font-size:11px;}
.pgroup{border-top:1px dashed var(--line); margin-top:8px; padding-top:8px;}
.minibtns{display:flex; gap:4px; flex-wrap:wrap;}
.minibtns button{padding:3px 6px; font-size:11px;}
#layersWrap{flex:1 1 auto; display:flex; flex-direction:column; min-height:0;}
#layers{flex:1 1 auto; overflow-y:auto;}
.layer{display:flex; align-items:center; gap:5px; padding:4px 8px; border-bottom:1px solid #23252b; cursor:pointer;}
.layer:hover{background:var(--panel2);}
.layer.sel{background:#3a2320; box-shadow:inset 2px 0 0 var(--accent);}
.layer .lname{flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.layer .lname input{width:100%;}
.lic{width:20px; height:20px; padding:0; background:transparent; border:none; display:flex;
  align-items:center; justify-content:center; color:var(--muted); font-size:12px;}
.lic:hover{color:var(--text); background:transparent;}
.lic svg{width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:1.6;}
.lic.off{opacity:.35;}
.layer.layerhead{background:#20242c;}
.layer.layerhead.active{box-shadow:inset 3px 0 0 var(--accent); background:#2c2621;}
.layer.layerhead .lname{font-weight:600;}
.layer.layerobj{padding-left:14px;}
.layer.layerobj .lname{font-size:12px;}
.layer .ltri{width:15px; height:20px; padding:0; background:transparent; border:none;
  color:var(--muted); cursor:pointer; font-size:9px; display:flex; align-items:center; justify-content:center;}
.layer .ltri:hover{color:var(--text);}
.layer .ldel:hover{color:var(--accent-h);}
#layerHead{display:flex; align-items:center; justify-content:space-between;}
#btnAddLayer{padding:0 8px; font-size:15px; line-height:1.4;}
.cmykrow{gap:2px; margin-top:-3px; margin-bottom:8px;}
.cmykrow .cmyklab{min-width:0; color:var(--muted); font-size:10px; margin-left:3px;}
.cmykrow input[type=number]{width:34px; padding:2px 3px;}

/* ===== カラースウォッチ＆ドラッグ式ピッカー ===== */
.swatch{position:relative; width:34px; height:24px; padding:0; border:1px solid var(--line);
  border-radius:4px; overflow:hidden; cursor:pointer;
  background-image:
    linear-gradient(45deg,#bbb 25%,transparent 25%),
    linear-gradient(-45deg,#bbb 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#bbb 75%),
    linear-gradient(-45deg,transparent 75%,#bbb 75%);
  background-size:10px 10px; background-position:0 0,0 5px,5px -5px,-5px 0px; background-color:#fff;}
.swatch:disabled{cursor:default; opacity:.5;}
.swatch .swatch-fill{position:absolute; inset:0;}
.colorpop{position:fixed; z-index:60; background:var(--panel2); border:1px solid var(--line);
  border-radius:6px; padding:10px; box-shadow:0 8px 24px rgba(0,0,0,.5); width:176px;}
.cp-sv{position:relative; width:100%; height:120px; border-radius:4px; cursor:crosshair; margin-bottom:10px; touch-action:none;}
.cp-hue{position:relative; width:100%; height:14px; border-radius:7px; cursor:pointer; margin-bottom:10px; touch-action:none;
  background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);}
.cp-thumb{position:absolute; width:14px; height:14px; border-radius:50%; border:2px solid #fff;
  box-shadow:0 0 0 1px rgba(0,0,0,.5); transform:translate(-50%,-50%); pointer-events:none; top:50%;}
.cp-hexrow{display:flex; align-items:center; gap:4px;}
.cp-hexrow span{color:var(--muted);}
.cp-hexrow input{flex:1; text-transform:uppercase;}

/* ===== ステータスバー ===== */
#status{flex:0 0 auto; display:flex; gap:16px; padding:4px 12px; background:var(--panel);
  border-top:1px solid var(--line); color:var(--muted); font-size:11px;}
#hint{flex:1;}
@media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>
<body>

<header id="topbar">
  <div id="logo"><div id="seal">画</div><span id="appname">ベクターデザイン工房</span></div>
  <input id="fname" value="無題のデザイン" title="ファイル名">
  <span class="sep"></span>
  <button id="btnNew">新規</button>
  <button id="btnOpen">開く</button>
  <button id="btnImport">インポート</button>
  <button id="btnSave">保存 (.json)</button>
  <div id="exportWrap" style="position:relative; display:inline-block;">
    <button id="btnExport" class="primary">書き出し ▾</button>
    <div id="exportMenu" style="display:none; flex-direction:column; gap:2px; position:absolute; top:calc(100% + 2px); left:0; background:var(--panel2); border:1px solid var(--line); border-radius:4px; padding:4px; z-index:30; min-width:130px;">
      <button data-fmt="svg" style="text-align:left; width:100%;">SVG (.svg)</button>
      <button data-fmt="png" style="text-align:left; width:100%;">PNG (.png)</button>
      <button data-fmt="jpeg" style="text-align:left; width:100%;">JPEG (.jpg)</button>
      <button data-fmt="pdf" style="text-align:left; width:100%;">PDF (.pdf)</button>
    </div>
  </div>
  <span class="sep"></span>
  <button id="btnUndo" title="元に戻す (Ctrl+Z)">↩ 戻す</button>
  <button id="btnRedo" title="やり直す (Ctrl+Y)">↪ 進む</button>
  <span class="sep"></span>
  <button id="btnZoomOut" title="縮小 (Ctrl+−)">−</button>
  <span id="zoomLabel">100%</span>
  <button id="btnZoomIn" title="拡大 (Ctrl++)">＋</button>
  <button id="btnFit" title="全体表示 (Ctrl+0)">全体</button>
  <span class="sep"></span>
  <label class="toggle"><input type="checkbox" id="chkGrid">グリッド</label>
  <label class="toggle"><input type="checkbox" id="chkSnap">スナップ</label>
  <label class="toggle"><input type="checkbox" id="chkRuler" checked>定規</label>
</header>

<div id="main">
  <nav id="toolbar" aria-label="ツール"></nav>

  <div id="canvasWrap">
    <svg id="stage">
      <defs>
        <pattern id="gridpat" width="20" height="20" patternUnits="userSpaceOnUse">
          <path id="gridpath" d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
        </pattern>
      </defs>
      <defs id="gradDefs"></defs>
      <g id="world">
        <rect id="artboard" x="0" y="0" fill="#ffffff" style="filter:drop-shadow(0 3px 14px rgba(0,0,0,.45))"/>
        <rect id="gridRect" x="0" y="0" fill="url(#gridpat)" style="display:none" pointer-events="none"/>
        <g id="shapesLayer"></g>
        <g id="overlayLayer" pointer-events="none"></g>
        <g id="handleLayer"></g>
      </g>
      <g id="guideLayer"></g>
      <g id="rulerLayer"></g>
    </svg>
    <div id="textEditor"><textarea id="textArea" rows="1"></textarea></div>
  </div>

  <aside id="side">
    <div class="paneltitle">プロパティ</div>
    <div id="props"></div>
    <div id="layersWrap">
      <div class="paneltitle" id="layerHead"><span>レイヤー（上が前面）</span><button id="btnAddLayer" title="新規レイヤーを追加">＋</button></div>
      <div id="layers"></div>
    </div>
  </aside>
</div>

<footer id="status"><span id="coords">x: 0, y: 0</span><span id="hint"></span></footer>
<input type="file" id="fileInput" accept=".json,application/json" style="display:none">
<input type="file" id="importInput" accept=".svg,image/svg+xml,image/png,image/jpeg,image/gif,image/webp,image/bmp" style="display:none">

<script>
"use strict";
/* ================= 状態 ================= */
const state = {
  doc: {w:1200, h:800, bg:'#ffffff'},
  shapes: [],
  layers: [],           // 上位レイヤー [{id,name,visible,locked,collapsed}]（背面→前面）
  activeLayer: null,    // 新規オブジェクトの配置先レイヤーID
  sel: new Set(),
  tool: 'select',
  zoom: 1, panX: 40, panY: 40,
  grid: false, snap: false, gridSize: 20,
  ruler: true, guides: {v:[], h:[]},
};
const styleNow = {fill:'#d8d1c2', stroke:'#33312e', strokeWidth:2, opacity:1, fillAlpha:1, strokeAlpha:1};
let idSeq = 1;
let groupSeq = 1;
let layerSeq = 1;
const undoStack = [], redoStack = [];
let clipboard = [];
let drag = null;          // 進行中のドラッグ操作
let pen = null;           // ペンツールの作業中の点列
let spaceDown = false;

const $ = id => document.getElementById(id);
const stage = $('stage'), world = $('world'), shapesLayer = $('shapesLayer'),
      overlayLayer = $('overlayLayer'), handleLayer = $('handleLayer');

/* ================= ユーティリティ ================= */
const deg2rad = d => d*Math.PI/180;
const dist = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
const snGrid = v => state.snap ? Math.round(v/state.gridSize)*state.gridSize : v;
function snapAxis(v, guides){
  const g0 = snGrid(v);
  if(state.ruler && guides.length){
    const thr = 6/state.zoom;
    for(const g of guides){ if(Math.abs(v-g)<thr) return g; }
  }
  return g0;
}
const snapX = v => snapAxis(v, state.guides.v);
const snapY = v => snapAxis(v, state.guides.h);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt = v => Math.round(v*10)/10;

/* ---- 色変換（RGB / CMYK） ---- */
function hexToRgb(hex){
  let h = String(hex||'').replace('#','');
  if(h.length===3) h = h.split('').map(c=>c+c).join('');
  const n = parseInt(h,16);
  if(!isFinite(n)) return {r:0,g:0,b:0};
  return {r:(n>>16)&255, g:(n>>8)&255, b:n&255};
}
function rgbToHex(r,g,b){
  return '#' + [r,g,b].map(v=>clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join('');
}
function rgbToCmyk(r,g,b){
  r/=255; g/=255; b/=255;
  const k = 1 - Math.max(r,g,b);
  if(k>=1) return {c:0, m:0, y:0, k:100};
  const c = (1-r-k)/(1-k), m = (1-g-k)/(1-k), y = (1-b-k)/(1-k);
  return {c:Math.round(c*100), m:Math.round(m*100), y:Math.round(y*100), k:Math.round(k*100)};
}
function cmykToHex(c,m,y,k){
  c=clamp(c,0,100)/100; m=clamp(m,0,100)/100; y=clamp(y,0,100)/100; k=clamp(k,0,100)/100;
  return rgbToHex(255*(1-c)*(1-k), 255*(1-m)*(1-k), 255*(1-y)*(1-k));
}
function hexToHsv(hex){
  const {r,g,b} = hexToRgb(hex);
  const r1=r/255, g1=g/255, b1=b/255;
  const max=Math.max(r1,g1,b1), min=Math.min(r1,g1,b1), d=max-min;
  let h=0;
  if(d){
    if(max===r1) h=60*(((g1-b1)/d)%6);
    else if(max===g1) h=60*((b1-r1)/d+2);
    else h=60*((r1-g1)/d+4);
  }
  if(h<0) h+=360;
  return {h, s:max?d/max*100:0, v:max*100};
}
function hsvToHex(h,s,v){
  s/=100; v/=100;
  const c=v*s, x=c*(1-Math.abs((h/60)%2-1)), m=v-c;
  let r1,g1,b1;
  if(h<60)[r1,g1,b1]=[c,x,0];
  else if(h<120)[r1,g1,b1]=[x,c,0];
  else if(h<180)[r1,g1,b1]=[0,c,x];
  else if(h<240)[r1,g1,b1]=[0,x,c];
  else if(h<300)[r1,g1,b1]=[x,0,c];
  else [r1,g1,b1]=[c,0,x];
  return rgbToHex((r1+m)*255, (g1+m)*255, (b1+m)*255);
}

/* ---- ドラッグ操作可能なカラーピッカー（彩度・明度・色相） ---- */
let colorPop = null;
function closeColorPop(){
  if(!colorPop) return;
  colorPop.el.remove();
  document.removeEventListener('pointerdown', colorPop.outside, true);
  colorPop = null;
}
function openColorPicker(anchor, hex, onLive){
  closeColorPop();
  const hsv = hexToHsv(hex==='none' ? '#000000' : hex);
  const pop = document.createElement('div');
  pop.className = 'colorpop';
  pop.innerHTML = `<div class="cp-sv"><div class="cp-thumb"></div></div>
    <div class="cp-hue"><div class="cp-thumb"></div></div>
    <div class="cp-hexrow"><span>#</span><input type="text" class="cp-hex" maxlength="6"></div>`;
  document.body.appendChild(pop);
  const ar = anchor.getBoundingClientRect();
  const pr = pop.getBoundingClientRect();
  let left = ar.left, top = ar.bottom+4;
  if(left+pr.width > innerWidth-8) left = innerWidth-pr.width-8;
  if(top+pr.height > innerHeight-8) top = ar.top-pr.height-4;
  pop.style.left = left+'px'; pop.style.top = top+'px';

  const sv = pop.querySelector('.cp-sv'), svT = sv.querySelector('.cp-thumb');
  const hue = pop.querySelector('.cp-hue'), hueT = hue.querySelector('.cp-thumb');
  const hexInput = pop.querySelector('.cp-hex');

  function paint(){
    sv.style.background = `linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, transparent), hsl(${fmt(hsv.h)}, 100%, 50%)`;
    svT.style.left = hsv.s+'%'; svT.style.top = (100-hsv.v)+'%';
    hueT.style.left = (hsv.h/360*100)+'%';
    hexInput.value = hsvToHex(hsv.h,hsv.s,hsv.v).slice(1).toUpperCase();
  }
  paint();
  function commit(){ onLive(hsvToHex(hsv.h,hsv.s,hsv.v)); paint(); }

  function dragOn(el, handler){
    el.addEventListener('pointerdown', e=>{
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      const move = ev=>{ handler(ev); commit(); };
      move(e);
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', ()=> el.removeEventListener('pointermove', move), {once:true});
    });
  }
  dragOn(sv, e=>{
    const b = sv.getBoundingClientRect();
    hsv.s = clamp((e.clientX-b.left)/b.width, 0, 1)*100;
    hsv.v = (1-clamp((e.clientY-b.top)/b.height, 0, 1))*100;
  });
  dragOn(hue, e=>{
    const b = hue.getBoundingClientRect();
    hsv.h = clamp((e.clientX-b.left)/b.width, 0, 1)*360;
  });
  hexInput.onchange = ()=>{
    const v = hexInput.value.trim();
    if(/^[0-9a-fA-F]{3}$|^[0-9a-fA-F]{6}$/.test(v)){
      const h2 = hexToHsv('#'+v);
      hsv.h=h2.h; hsv.s=h2.s; hsv.v=h2.v;
      commit();
    }else paint();
  };
  colorPop = {el:pop, outside: e=>{ if(!pop.contains(e.target) && !anchor.contains(e.target)) closeColorPop(); }};
  setTimeout(()=> document.addEventListener('pointerdown', colorPop.outside, true), 0);
}

/* ---- 上位レイヤー ---- */
function newLayer(name){
  return {id:'L'+(layerSeq++), name:name||('レイヤー '+(state.layers.length+1)), visible:true, locked:false, collapsed:false};
}
function ensureLayers(){
  if(!Array.isArray(state.layers) || !state.layers.length){
    state.layers = [newLayer('レイヤー 1')];
  }
  const ids = new Set(state.layers.map(l=>l.id));
  if(!state.activeLayer || !ids.has(state.activeLayer))
    state.activeLayer = state.layers[state.layers.length-1].id;
  const def = state.layers[0].id;
  state.shapes.forEach(s=>{ if(!s.layerId || !ids.has(s.layerId)) s.layerId = def; });
}
function layerOf(s){ return state.layers.find(l=>l.id===s.layerId); }
function shapeVisible(s){ const l = layerOf(s); return s.visible && (!l || l.visible); }
function shapeLocked(s){ const l = layerOf(s); return !!s.locked || !!(l && l.locked); }
function layerOrderIndex(id){ const i = state.layers.findIndex(l=>l.id===id); return i<0 ? state.layers.length : i; }
function normalizeOrder(){
  // レイヤー順で安定ソートし、state.shapes をレイヤーごとにまとめる（重ね順の一貫性を保つ）
  state.shapes.sort((a,b)=> layerOrderIndex(a.layerId) - layerOrderIndex(b.layerId));
}

function toWorld(e){
  const pt = stage.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  return pt.matrixTransform(world.getScreenCTM().inverse());
}
function toScreen(p){
  const pt = stage.createSVGPoint();
  pt.x = p.x; pt.y = p.y;
  const s = pt.matrixTransform(world.getScreenCTM());
  const r = $('canvasWrap').getBoundingClientRect();
  return {x: s.x - r.left, y: s.y - r.top};
}

/* ================= 図形定義 ================= */
const typeNames = {rect:'長方形', ellipse:'楕円', line:'直線', poly:'多角形', star:'星形', path:'パス', text:'テキスト', image:'画像'};

function newShape(type, extra){
  ensureLayers();
  const s = Object.assign({
    id: idSeq++, type, name: '', layerId: state.activeLayer,
    fill: styleNow.fill, stroke: styleNow.stroke, strokeWidth: styleNow.strokeWidth,
    opacity: styleNow.opacity, fillAlpha: styleNow.fillAlpha, strokeAlpha: styleNow.strokeAlpha,
    rotation: 0, visible: true, locked: false,
  }, extra);
  if(!s.name) s.name = (typeNames[s.star ? 'star' : type] || type) + ' ' + s.id;
  return s;
}

function polyPoints(s){
  const pts = [], n = s.star ? s.sides*2 : s.sides;
  for(let i=0;i<n;i++){
    const ang = -Math.PI/2 + i*2*Math.PI/n;
    const rr = s.star ? (i%2===0 ? s.r : s.r*s.inner) : s.r;
    pts.push([s.cx + rr*Math.cos(ang), s.cy + rr*Math.sin(ang)]);
  }
  return pts;
}

function pathD(s){
  const p = s.pts;
  if(p.length < 2) return '';
  if(!s.smooth){
    let d = 'M ' + fmt(p[0].x) + ' ' + fmt(p[0].y);
    for(let i=1;i<p.length;i++) d += ' L ' + fmt(p[i].x) + ' ' + fmt(p[i].y);
    if(s.closed) d += ' Z';
    return d;
  }
  // Catmull-Rom → ベジェ変換（滑らかな曲線）
  const n = p.length;
  const get = i => s.closed ? p[(i+n)%n] : p[clamp(i,0,n-1)];
  let d = 'M ' + fmt(p[0].x) + ' ' + fmt(p[0].y);
  const last = s.closed ? n : n-1;
  for(let i=0;i<last;i++){
    const p0=get(i-1), p1=get(i), p2=get(i+1), p3=get(i+2);
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d += ' C ' + [c1x,c1y,c2x,c2y,p2.x,p2.y].map(fmt).join(' ');
  }
  if(s.closed) d += ' Z';
  return d;
}

/* ================= グラデーション ================= */
function gradientId(s){ return 'grad'+s.id; }
function gradientDefString(s){
  const g = s.fill, gid = gradientId(s);
  const stops = (g.stops||[]).map(st=>`<stop offset="${fmt(clamp(st.offset,0,1)*100)}%" stop-color="${esc(st.color)}"/>`).join('');
  if(g.type==='radial'){
    return `<radialGradient id="${gid}" cx="50%" cy="50%" r="70%">${stops}</radialGradient>`;
  }
  const ang = deg2rad(g.angle||0);
  const x1 = 50 - 50*Math.cos(ang), y1 = 50 - 50*Math.sin(ang);
  const x2 = 50 + 50*Math.cos(ang), y2 = 50 + 50*Math.sin(ang);
  return `<linearGradient id="${gid}" x1="${fmt(x1)}%" y1="${fmt(y1)}%" x2="${fmt(x2)}%" y2="${fmt(y2)}%">${stops}</linearGradient>`;
}
function markerDefString(s){
  const col = s.stroke==='none' ? '#000000' : s.stroke;
  return `<marker id="arw${s.id}" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="4.5" markerHeight="4.5" orient="auto-start-reverse" markerUnits="strokeWidth"><path d="M 0 0 L 10 5 L 0 10 z" fill="${esc(col)}"/></marker>`;
}
function dynamicDefStrings(){
  const out = [];
  state.shapes.forEach(s=>{
    if(s.fill && typeof s.fill==='object') out.push(gradientDefString(s));
    if((s.arrowS||s.arrowE) && (s.type==='line'||(s.type==='path'&&!s.closed))) out.push(markerDefString(s));
  });
  return out;
}
function updateGradientDefs(){
  $('gradDefs').innerHTML = dynamicDefStrings().join('');
}

function shapeEl(s, live){
  const NS = 'http://www.w3.org/2000/svg';
  let el;
  switch(s.type){
    case 'image':
      el = document.createElementNS(NS,'image');
      el.setAttribute('x',fmt(s.x)); el.setAttribute('y',fmt(s.y));
      el.setAttribute('width',fmt(Math.max(0,s.w))); el.setAttribute('height',fmt(Math.max(0,s.h)));
      el.setAttribute('preserveAspectRatio','none');
      el.setAttribute('href', s.src);
      el.setAttributeNS('http://www.w3.org/1999/xlink','xlink:href', s.src);
      break;
    case 'rect':
      el = document.createElementNS(NS,'rect');
      el.setAttribute('x',fmt(s.x)); el.setAttribute('y',fmt(s.y));
      el.setAttribute('width',fmt(Math.max(0,s.w))); el.setAttribute('height',fmt(Math.max(0,s.h)));
      if(s.rx) el.setAttribute('rx',fmt(s.rx));
      break;
    case 'ellipse':
      el = document.createElementNS(NS,'ellipse');
      el.setAttribute('cx',fmt(s.cx)); el.setAttribute('cy',fmt(s.cy));
      el.setAttribute('rx',fmt(Math.max(0,s.rx))); el.setAttribute('ry',fmt(Math.max(0,s.ry)));
      break;
    case 'line':
      el = document.createElementNS(NS,'line');
      el.setAttribute('x1',fmt(s.x1)); el.setAttribute('y1',fmt(s.y1));
      el.setAttribute('x2',fmt(s.x2)); el.setAttribute('y2',fmt(s.y2));
      break;
    case 'poly':
      el = document.createElementNS(NS,'polygon');
      el.setAttribute('points', polyPoints(s).map(p=>fmt(p[0])+','+fmt(p[1])).join(' '));
      break;
    case 'path':
      el = document.createElementNS(NS,'path');
      el.setAttribute('d', pathD(s));
      break;
    case 'text':{
      el = document.createElementNS(NS,'text');
      el.setAttribute('x',fmt(s.x)); el.setAttribute('y',fmt(s.y));
      el.setAttribute('font-size',s.size);
      el.setAttribute('font-family',s.font||'sans-serif');
      if(s.bold) el.setAttribute('font-weight','bold');
      const lines = String(s.text).split('\n');
      lines.forEach((ln,i)=>{
        const t = document.createElementNS(NS,'tspan');
        t.setAttribute('x',fmt(s.x));
        if(i>0) t.setAttribute('dy','1.25em');
        t.textContent = ln || ' ';
        el.appendChild(t);
      });
      break;
    }
  }
  if(s.type==='line' || (s.type==='path' && !s.closed && s.fill==='none')){
    el.setAttribute('fill','none');
  }else if(s.type!=='line' && s.type!=='image'){
    el.setAttribute('fill', typeof s.fill==='object' ? `url(#${gradientId(s)})` : s.fill);
    if(s.fill!=='none' && s.fillAlpha<1) el.setAttribute('fill-opacity', s.fillAlpha);
  }
  if(s.stroke!=='none' && s.strokeWidth>0 && s.type!=='image'){
    el.setAttribute('stroke', s.stroke);
    el.setAttribute('stroke-width', s.strokeWidth);
    el.setAttribute('stroke-linecap','round');
    el.setAttribute('stroke-linejoin','round');
    if(s.strokeAlpha<1) el.setAttribute('stroke-opacity', s.strokeAlpha);
    if(s.dash==='dash') el.setAttribute('stroke-dasharray', `${s.strokeWidth*3} ${s.strokeWidth*2}`);
    else if(s.dash==='dot') el.setAttribute('stroke-dasharray', `0.1 ${s.strokeWidth*2}`);
    if(s.type==='line' || (s.type==='path' && !s.closed)){
      if(s.arrowS) el.setAttribute('marker-start', `url(#arw${s.id})`);
      if(s.arrowE) el.setAttribute('marker-end', `url(#arw${s.id})`);
    }
  }
  if(s.opacity < 1) el.setAttribute('opacity', s.opacity);
  if(s.rotation){
    const b = geomBBox(s);
    el.setAttribute('transform', `rotate(${fmt(s.rotation)} ${fmt(b.x+b.w/2)} ${fmt(b.y+b.h/2)})`);
  }
  if(live){
    el.setAttribute('id','el-'+s.id);
    el.dataset.id = s.id;
    if(shapeLocked(s)) el.setAttribute('pointer-events','none');
  }
  return el;
}

/* ================= バウンディングボックス ================= */
function geomBBox(s){
  switch(s.type){
    case 'rect': return {x:s.x, y:s.y, w:s.w, h:s.h};
    case 'image': return {x:s.x, y:s.y, w:s.w, h:s.h};
    case 'ellipse': return {x:s.cx-s.rx, y:s.cy-s.ry, w:s.rx*2, h:s.ry*2};
    case 'line':{
      const x=Math.min(s.x1,s.x2), y=Math.min(s.y1,s.y2);
      return {x, y, w:Math.abs(s.x2-s.x1), h:Math.abs(s.y2-s.y1)};
    }
    case 'poly':{
      const pts = polyPoints(s);
      const xs = pts.map(p=>p[0]), ys = pts.map(p=>p[1]);
      const x=Math.min(...xs), y=Math.min(...ys);
      return {x, y, w:Math.max(...xs)-x, h:Math.max(...ys)-y};
    }
    case 'path':{
      const xs = s.pts.map(p=>p.x), ys = s.pts.map(p=>p.y);
      const x=Math.min(...xs), y=Math.min(...ys);
      return {x, y, w:Math.max(...xs)-x, h:Math.max(...ys)-y};
    }
    case 'text':{
      const el = $('el-'+s.id);
      if(el){ const b = el.getBBox(); return {x:b.x, y:b.y, w:b.width, h:b.height}; }
      return {x:s.x, y:s.y-s.size, w:s.size*String(s.text).length*0.6, h:s.size*1.2};
    }
  }
}
function renderBBox(s){
  const b = geomBBox(s);
  if(!s.rotation) return b;
  const cx=b.x+b.w/2, cy=b.y+b.h/2, a=deg2rad(s.rotation);
  const cos=Math.cos(a), sin=Math.sin(a);
  const corners = [[b.x,b.y],[b.x+b.w,b.y],[b.x+b.w,b.y+b.h],[b.x,b.y+b.h]].map(([px,py])=>{
    const dx=px-cx, dy=py-cy;
    return [cx+dx*cos-dy*sin, cy+dx*sin+dy*cos];
  });
  const xs=corners.map(c=>c[0]), ys=corners.map(c=>c[1]);
  const x=Math.min(...xs), y=Math.min(...ys);
  return {x, y, w:Math.max(...xs)-x, h:Math.max(...ys)-y};
}
function selShapes(){ return state.shapes.filter(s=>state.sel.has(s.id)); }
function selBBox(){
  const ss = selShapes();
  if(!ss.length) return null;
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
  ss.forEach(s=>{
    const b = renderBBox(s);
    x1=Math.min(x1,b.x); y1=Math.min(y1,b.y);
    x2=Math.max(x2,b.x+b.w); y2=Math.max(y2,b.y+b.h);
  });
  return {x:x1, y:y1, w:x2-x1, h:y2-y1};
}

/* ================= 履歴 ================= */
function snapshot(){ return JSON.stringify({shapes:state.shapes, layers:state.layers, activeLayer:state.activeLayer}); }
function restoreSnapshot(str){
  const d = JSON.parse(str);
  state.shapes = d.shapes;
  if(Array.isArray(d.layers)) state.layers = d.layers;
  if(d.activeLayer) state.activeLayer = d.activeLayer;
}
function pushHistory(){
  undoStack.push(snapshot());
  if(undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(snapshot());
  restoreSnapshot(undoStack.pop());
  pruneSel(); render();
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(snapshot());
  restoreSnapshot(redoStack.pop());
  pruneSel(); render();
}
function pruneSel(){
  const ids = new Set(state.shapes.map(s=>s.id));
  [...state.sel].forEach(id=>{ if(!ids.has(id)) state.sel.delete(id); });
}

/* ================= 描画 ================= */
function updateWorld(){
  world.setAttribute('transform', `translate(${state.panX} ${state.panY}) scale(${state.zoom})`);
  $('zoomLabel').textContent = Math.round(state.zoom*100)+'%';
  renderChrome();
}
/* --- 定規とガイド（スクリーン座標で描画） --- */
function renderChrome(){
  const gl = $('guideLayer'), rl = $('rulerLayer');
  gl.innerHTML = ''; rl.innerHTML = '';
  if(!state.ruler) return;
  const NS = 'http://www.w3.org/2000/svg';
  const rc = stage.getBoundingClientRect();
  const W = rc.width, H = rc.height, z = state.zoom;
  const mk = (tag, attrs, parent)=>{
    const el = document.createElementNS(NS, tag);
    for(const k in attrs) el.setAttribute(k, attrs[k]);
    parent.appendChild(el);
    return el;
  };
  // ガイド線
  state.guides.v.forEach((g,i)=>{
    const x = state.panX + g*z;
    mk('line',{x1:x,y1:0,x2:x,y2:H,stroke:'#3aa0ff','stroke-width':1,'pointer-events':'none'},gl);
    const hit = mk('line',{x1:x,y1:0,x2:x,y2:H,stroke:'transparent','stroke-width':7},gl);
    hit.dataset.guide = 'v:'+i; hit.style.cursor = 'ew-resize';
  });
  state.guides.h.forEach((g,i)=>{
    const y = state.panY + g*z;
    mk('line',{x1:0,y1:y,x2:W,y2:y,stroke:'#3aa0ff','stroke-width':1,'pointer-events':'none'},gl);
    const hit = mk('line',{x1:0,y1:y,x2:W,y2:y,stroke:'transparent','stroke-width':7},gl);
    hit.dataset.guide = 'h:'+i; hit.style.cursor = 'ns-resize';
  });
  // 定規の背景
  mk('rect',{x:0,y:0,width:W,height:20,fill:'#1f2127'},rl);
  mk('rect',{x:0,y:0,width:20,height:H,fill:'#1f2127'},rl);
  // 目盛り間隔（画面上でおよそ60pxになる切りのよい値）
  const target = 60/z;
  const pow = Math.pow(10, Math.floor(Math.log10(target)));
  const m = target/pow;
  const step = (m<1.5 ? 1 : m<3.5 ? 2 : m<7.5 ? 5 : 10)*pow;
  let d = '';
  const x0 = Math.floor(((20-state.panX)/z)/step)*step;
  for(let x=x0; state.panX+x*z<=W; x+=step){
    const sx = state.panX + x*z;
    if(sx < 20) continue;
    d += `M ${fmt(sx)} 13 V 20 `;
    const t = mk('text',{x:sx+3,y:10,'font-size':9,fill:'#8b909b'},rl);
    t.textContent = fmt(x);
  }
  const y0 = Math.floor(((20-state.panY)/z)/step)*step;
  for(let y=y0; state.panY+y*z<=H; y+=step){
    const sy = state.panY + y*z;
    if(sy < 20) continue;
    d += `M 13 ${fmt(sy)} H 20 `;
    const t = mk('text',{x:11,y:sy-3,'font-size':9,fill:'#8b909b',transform:`rotate(-90 11 ${fmt(sy-3)})`},rl);
    t.textContent = fmt(y);
  }
  mk('path',{d, stroke:'#5a5f6b','stroke-width':1, fill:'none'},rl);
  mk('rect',{x:0,y:0,width:20,height:20,fill:'#25272e'},rl);
  mk('line',{x1:0,y1:20,x2:W,y2:20,stroke:'#2e313a','stroke-width':1},rl);
  mk('line',{x1:20,y1:0,x2:20,y2:H,stroke:'#2e313a','stroke-width':1},rl);
}
function render(skipProps){
  const d = state.doc;
  const ab = $('artboard');
  ab.setAttribute('width',d.w); ab.setAttribute('height',d.h); ab.setAttribute('fill',d.bg==='none'?'#ffffff':d.bg);
  const gr = $('gridRect');
  gr.setAttribute('width',d.w); gr.setAttribute('height',d.h);
  gr.style.display = state.grid ? '' : 'none';
  $('gridpat').setAttribute('width',state.gridSize);
  $('gridpat').setAttribute('height',state.gridSize);
  $('gridpath').setAttribute('d',`M ${state.gridSize} 0 L 0 0 0 ${state.gridSize}`);

  ensureLayers();
  normalizeOrder();
  updateGradientDefs();
  shapesLayer.innerHTML = '';
  state.shapes.forEach(s=>{ if(shapeVisible(s)) shapesLayer.appendChild(shapeEl(s,true)); });

  renderHandles();
  renderLayers();
  if(!skipProps) renderProps();
  updateWorld();
  autosave();
}

function renderNodeHandles(){
  const ss = selShapes();
  if(ss.length !== 1) return;
  const s = ss[0];
  let pts;
  if(s.type==='path') pts = s.pts;
  else if(s.type==='line') pts = [{x:s.x1,y:s.y1},{x:s.x2,y:s.y2}];
  else return;
  const NS = 'http://www.w3.org/2000/svg', z = state.zoom;
  pts.forEach((pt,i)=>{
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx',pt.x); c.setAttribute('cy',pt.y); c.setAttribute('r',4.5/z);
    c.setAttribute('fill','#fff'); c.setAttribute('stroke','#d24a35'); c.setAttribute('stroke-width',1.2/z);
    c.dataset.node = i; c.style.cursor = 'move';
    handleLayer.appendChild(c);
  });
}
function renderHandles(){
  handleLayer.innerHTML = '';
  overlayRenderPen();
  if(state.tool==='node'){ renderNodeHandles(); return; }
  const b = selBBox();
  if(!b || drag && drag.mode==='marquee') { if(!b) return; }

  const handles = [
    ['nw',b.x,b.y],['n',b.x+b.w/2,b.y],['ne',b.x+b.w,b.y],
    ['e',b.x+b.w,b.y+b.h/2],['se',b.x+b.w,b.y+b.h],
    ['s',b.x+b.w/2,b.y+b.h],['sw',b.x,b.y+b.h],['w',b.x,b.y+b.h/2],
  ];
  const cursors = {nw:'nwse-resize',se:'nwse-resize',ne:'nesw-resize',sw:'nesw-resize',n:'ns-resize',s:'ns-resize',e:'ew-resize',w:'ew-resize'};
  handles.forEach(([h,x,y])=>{
    const r = document.createElementNS(NS,'rect');

    r.dataset.handle = h; r.style.cursor = cursors[h];
    handleLayer.appendChild(r);
  });
  // 回転ハンドル（単一選択時のみ）
  if(state.sel.size===1){
    const line = document.createElementNS(NS,'line');
    line.setAttribute('x1',b.x+b.w/2); line.setAttribute('y1',b.y);
    line.setAttribute('x2',b.x+b.w/2); line.setAttribute('y2',b.y-20/z);
    line.setAttribute('stroke','#d24a35'); line.setAttribute('stroke-width',1/z);
    line.setAttribute('pointer-events','none');
    handleLayer.appendChild(line);
    const c = document.createElementNS(NS,'circle');
    c.setAttribute('cx',b.x+b.w/2); c.setAttribute('cy',b.y-20/z); c.setAttribute('r',5/z);
    c.setAttribute('fill','#fff'); c.setAttribute('stroke','#d24a35'); c.setAttribute('stroke-width',1/z);
    c.dataset.rotate = '1'; c.style.cursor = 'crosshair';
    handleLayer.appendChild(c);
  }
}

function overlayRenderPen(){
  overlayLayer.innerHTML = '';
  const NS='http://www.w3.org/2000/svg', z=state.zoom;

}
